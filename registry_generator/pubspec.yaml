name: registry_generator
description: >
  Standalone tool that generates registry.json from released Official
  Knowledge Packs. Release-driven only - never reads REVIEW_NOTES.md,
  never touches humanity_vault_app/. See README.md.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.9.0

dependencies:
  archive: ^3.6.1
  crypto: ^3.0.3

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
